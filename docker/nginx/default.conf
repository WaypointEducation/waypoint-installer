server {
    listen 8080;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Serve built assets directly (no Laravel, no redirects, correct MIME types)
    location ^~ /build/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Serve common static files directly
    location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|svg|webp|ico|ttf|otf|woff|woff2)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # Important: pass original host/scheme (Caddy sets these)
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS $https if_not_empty;

        fastcgi_pass waypoint-app:9000;
    }

    client_max_body_size 50m;
}

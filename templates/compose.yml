services:
  waypoint-app:
    image: ${WAYPOINT_APP_IMAGE}
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - /opt/waypoint/data/storage:/var/www/html/storage
    restart: unless-stopped

  waypoint-web:
    image: ${WAYPOINT_APP_IMAGE}
    env_file:
      - .env
    depends_on:
      - waypoint-app

    # IMPORTANT: mount the server block into conf.d (NOT nginx.conf)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

    # Fix nginx writing under /var/lib/nginx on images that run as non-root
    tmpfs:
      - /var/lib/nginx
      - /tmp

    command:
      - sh
      - -lc
      - |
        mkdir -p /var/lib/nginx/logs /var/lib/nginx/tmp
        exec nginx -g 'daemon off;'

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

    restart: unless-stopped

  waypoint-queue:
    image: ${WAYPOINT_APP_IMAGE}
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - /opt/waypoint/data/storage:/var/www/html/storage
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=120"]
    restart: unless-stopped

  waypoint-scheduler:
    image: ${WAYPOINT_APP_IMAGE}
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - /opt/waypoint/data/storage:/var/www/html/storage
    command: ["sh", "-lc", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - /opt/waypoint/data/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - /opt/waypoint/data/redis:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL}
      CADDY_DOMAIN: ${CADDY_DOMAIN}
      TLS_MODE: ${TLS_MODE}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - waypoint-web
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
